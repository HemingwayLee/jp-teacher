services:
  backend:
    build: ./backend
    container_name: jp-teacher-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
    # Allows the container to reach Ollama running on the host machine.
    # On Linux, Docker adds host-gateway automatically; on Mac/Windows it's built in.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: jp-teacher-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
